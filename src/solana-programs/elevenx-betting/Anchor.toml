[toolchain]
anchor_version = "0.30.1"

[features]
resolution = true
skip_lint = false

[programs.devnet]
elevenx_betting = "4qyCfiThJaaRGmNCaJSGbPei5fENytMBtbvquv57Z4v6"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
startup_wait = 5000
shutdown_wait = 2000
upgradeable = false

[test.validator]
bind_address = "127.0.0.1"
ledger = ".anchor/test-ledger"
rpc_port = 8899